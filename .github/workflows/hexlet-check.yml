name: hexlet-check

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: make install
      
      - name: Run linter
        run: make lint
      
      - name: Check package.json
        run: |
          node --version
          npm --version
          cat package.json | head -20